# Scientific Paper Searcher Configuration

skill:
  name: scientific-paper-searcher
  version: 2.0.0
  created: 2026-01-29
  updated: 2026-02-07
  author: kevin

triggers:
  phrases:
    - "find papers on"
    - "search for scientific papers"
    - "find research about"
    - "what papers exist on"
    - "search pubmed for"
    - "search arxiv for"
    - "search semantic scholar for"
    - "find citations for"
    - "who cited this paper"
    - "search crossref for"
  keywords:
    - scientific papers
    - research papers
    - literature search
    - pubmed
    - arxiv
    - semantic scholar
    - crossref
    - citation count
    - paper search

dependencies:
  tools:
    - WebFetch
    - WebSearch
    - Bash
  cli:
    - curl
    - jq
    - xmllint
  env:
    - name: SEMANTIC_SCHOLAR_API_KEY
      required: false
      description: API key from semanticscholar.org — enables 1 RPS (vs shared pool throttling)

loading:
  primary: SKILL.md
  on_failure: MEMO.md
  references:
    - references/search_strategies.md

compaction:
  cycle_threshold: 15
  iteration_count: 0

budget:
  skill_max: 2000
  memo_max: 1000
  reference_max: 1000
