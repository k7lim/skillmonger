skill:
  name: git-housekeeping
  version: 1.0.0
  created: 2026-06-02
  updated: 2026-06-02
  author: kevin

triggers:
  phrases:
    - "git housekeeping"
    - "clean up my git state"
    - "make a good commit trail"
    - "commit these changes"
    - "split this into commits"
    - "sync and push this branch"
  keywords:
    - git
    - commit
    - staging
    - unstaged
    - untracked
    - remote
    - upstream
    - rebase
    - push

dependencies:
  tools:
    - git
  skills:
    - review
    - diagnose
    - tdd

loading:
  primary: SKILL.md
  on_failure: MEMO.md
  always_load:
    - CONFIG.yaml

compaction:
  cycle_threshold: 15
  last_compaction: null
  iteration_count: 0

budget:
  metadata_max: 100
  skill_max: 5000
  memo_max: 2000
