skill:
  name: diagnose
  version: 1.0.0
  created: 2026-05-26
  updated: 2026-05-26
  author: kevin

triggers:
  phrases:
    - "diagnose this"
    - "debug this"
    - "something is broken"
    - "performance regression"
  keywords:
    - diagnose
    - debug
    - failing
    - regression
    - reproduce

dependencies:
  skills: [improve-codebase-architecture]

loading:
  primary: SKILL.md
  on_failure: MEMO.md
  always_load:
    - CONFIG.yaml

compaction:
  cycle_threshold: 15
  last_compaction: null
  iteration_count: 1

budget:
  metadata_max: 100
  skill_max: 5000
  memo_max: 2000
