skill:
  name: agent-cli-playbook
  version: 1.0.0
  created: 2026-06-03
  updated: 2026-06-03
  author: kevin

triggers:
  phrases:
    - "agent CLI playbook"
    - "default command shapes"
    - "agent-friendly commands"
    - "CLI defaults"
  keywords:
    - rg
    - bat
    - jq
    - sqlite3
    - lsof
    - curl
    - git diff

dependencies: {}

loading:
  primary: SKILL.md
  on_failure: MEMO.md
  always_load:
    - CONFIG.yaml

compaction:
  cycle_threshold: 15
  last_compaction: null
  iteration_count: 0

budget:
  metadata_max: 100
  skill_max: 5000
  memo_max: 2000
