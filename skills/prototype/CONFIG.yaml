skill:
  name: prototype
  version: 1.0.0
  created: 2026-05-26
  updated: 2026-05-26
  author: kevin

triggers:
  phrases:
    - "prototype this"
    - "try a few designs"
    - "let me play with it"
    - "sanity-check this model"
  keywords:
    - prototype
    - mockup
    - state machine
    - design options

dependencies:
  tools:
    - filesystem

loading:
  primary: SKILL.md
  on_failure: MEMO.md
  always_load:
    - CONFIG.yaml

compaction:
  cycle_threshold: 15
  last_compaction: null
  iteration_count: 0

budget:
  metadata_max: 100
  skill_max: 5000
  memo_max: 2000
